services:
  mysql:
    image: mysql:8.0
    container_name: MysqlVote
    restart: always
    # This works in 8.0, but NOT in 9.0+
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: OnlineVoting@2026
      MYSQL_DATABASE: onlinevote
    ports:
      - "3308:3306"
    volumes:
      - vol-mysql2:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pOnlineVoting@2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: sayankarmakar/onlinevote:2.0.1
    container_name: VotingApp
    ports:
      - "9061:9061"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 9061
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - vol-app:/app

volumes:
  vol-app:
  vol-mysql2: